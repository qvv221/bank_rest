databaseChangeLog:
  - changeSet:
      id: 1
      author: ai
      changes:
        - sqlFile:
            path: sql/init.sql
            relativeToChangelogFile: true
      rollback:
        - sqlFile:
            path: sql/rollback/init_rollback.sql
            relativeToChangelogFile: true
  - changeSet:
      id: 2
      author: bank_rest
      changes:
        - sqlFile:
            path: sql/insert.sql
            relativeToChangelogFile: true
      rollback:
        - sqlFile:
            path: sql/rollback/insert_rollback.sql
            relativeToChangelogFile: true