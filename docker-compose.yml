services:
  postgres:
    image: postgres:16
    container_name: bank_rest_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: bank_rest
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bank_rest"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - bank_rest

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bank_rest_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bank_rest
    ports:
      - "8080:8080"
    networks:
      - bank_rest

networks:
  bank_rest:
    name: bank_rest
